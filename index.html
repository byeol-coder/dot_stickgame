<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>닷 스틱 — 마지막 빛을 가져라</title>
  <style>
    html, body, iframe {
      width: 100%;
      height: 100%;
      margin: 0;
      border: 0;
    }
    body {
      background: #050b07;
      overflow: hidden;
    }
    iframe {
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    id="gameFrame"
    title="닷 스틱 게임"
    allow="bluetooth; microphone; autoplay; clipboard-write"
  ></iframe>

  <script>
    (function () {
      'use strict';

      var gameFrame = document.getElementById('gameFrame');

      // TW가 index.html에 전달한 embed/preview/lang 등의 값을 실제 게임 문서에도 전달한다.
      // 임베드 호스트가 iframe 문서를 캐시하는 경우에도 최신 레이아웃을 받도록
      // 배포 버전을 함께 전달한다. 기존 embed/preview/lang 파라미터는 보존한다.
      var query = window.location.search;
      gameFrame.src = 'game-source.html' + query + (query ? '&' : '?') + 'v=stage-center-2' + window.location.hash;

      // 빛의 스틱 무대는 game-source.html에 직접 통합되어 있다(통합 구현 채택).
      // 오버레이(enhanced-stage.js/css, dot-stick-image.css) 주입은 이중 렌더·이중 효과음을
      // 막기 위해 비활성화한다 — 파일 자체는 비교/롤백을 위해 저장소에 남겨 둔다.
      // 모바일 미리보기 표현 보정(mobile-preview-fix.css)만 계속 주입한다.
      gameFrame.addEventListener('load', function () {
        try {
          var frameDocument = gameFrame.contentDocument;
          if (!frameDocument || !frameDocument.head) return;

          if (!frameDocument.getElementById('mobilePreviewFixStyles')) {
            var mobilePreviewStylesheet = frameDocument.createElement('link');
            mobilePreviewStylesheet.id = 'mobilePreviewFixStyles';
            mobilePreviewStylesheet.rel = 'stylesheet';
            mobilePreviewStylesheet.href = 'mobile-preview-fix.css?v=stage-center-2';
            frameDocument.head.appendChild(mobilePreviewStylesheet);
          }
        } catch (error) {
          // 임베드 호스트 정책으로 접근이 막힌 경우에도 원본 게임을 그대로 유지한다.
          console.warn('[dot-stick] cinematic stage enhancement skipped', error);
        }
      });

      // game-source.html → wrapper → Tactile Worlds
      // 중첩 iframe 구조에서는 자식의 postMessage가 자동으로 최상위 부모까지 전달되지 않는다.
      window.addEventListener('message', function (event) {
        if (event.source !== gameFrame.contentWindow) return;

        var data = event.data;
        if (!data || (data.source !== 'dotarcade' && data.source !== 'dotstick-stage')) return;

        if (window.parent !== window) {
          window.parent.postMessage(data, '*');
        }
      });

      // 필요할 경우 TW → wrapper 메시지도 실제 게임 문서로 전달한다.
      window.addEventListener('message', function (event) {
        if (event.source === gameFrame.contentWindow) return;
        if (!gameFrame.contentWindow) return;

        var data = event.data;
        if (!data || typeof data !== 'object') return;

        gameFrame.contentWindow.postMessage(data, '*');
      });
    })();
  </script>
</body>
</html>
