name: Apply single-file embed viewport patch

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.issue.title == '[internal] apply embed viewport patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Inline embed layout and patch resize reporting
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          css_path = Path('embed-overrides.css')
          text = index_path.read_text(encoding='utf-8')
          css = css_path.read_text(encoding='utf-8')

          title = '  <title>닷 스틱 — 마지막 빛을 가져라</title>'
          early = '''  <title>닷 스틱 — 마지막 빛을 가져라</title>
  <script>
    // Apply the fixed Tactile Worlds viewport before the first paint.
    if (new URLSearchParams(location.search).get('embed') === '1') {
      document.documentElement.classList.add('embed-mode');
    }
  </script>'''
          if 'Apply the fixed Tactile Worlds viewport before the first paint' not in text:
              if title not in text:
                  raise SystemExit('title marker not found')
              text = text.replace(title, early, 1)

          style_marker = 'id="tactile-worlds-embed-viewport"'
          if style_marker not in text:
              style = '\n  <style id="tactile-worlds-embed-viewport">\n' + css + '\n  </style>\n'
              if '</head>' not in text:
                  raise SystemExit('head closing tag not found')
              text = text.replace('</head>', style + '</head>', 1)

          old = '''    function watchResize() {
      if (window.self === window.top) return;
      var last = 0;
      var report = function () {
        var h = Math.ceil(document.documentElement.scrollHeight);
        if (h !== last) { last = h; post({ type: 'resize', height: h }); }
      };
      if (window.ResizeObserver) { new ResizeObserver(report).observe(document.body); }
      report();
    }'''
          new = '''    function watchResize() {
      if (window.self === window.top) return;
      var last = 0;
      var report = function () {
        // Embed mode follows the iframe viewport instead of expanding the host page.
        var h = IS_EMBED
          ? Math.max(1, Math.round(window.innerHeight))
          : Math.ceil(document.documentElement.scrollHeight);
        if (h !== last) { last = h; post({ type: 'resize', height: h, fixed: IS_EMBED }); }
      };
      if (window.ResizeObserver) { new ResizeObserver(report).observe(document.body); }
      window.addEventListener('resize', report, { passive: true });
      report();
    }'''

          if 'Embed mode follows the iframe viewport instead of expanding the host page' not in text:
              if old in text:
                  text = text.replace(old, new, 1)
              else:
                  pattern = re.compile(r"    function watchResize\(\) \{.*?\n    \}", re.S)
                  match = pattern.search(text)
                  if not match:
                      raise SystemExit('watchResize function not found')
                  text = text[:match.start()] + new + text[match.end():]

          index_path.write_text(text, encoding='utf-8')
          Path('game-source.html').unlink(missing_ok=True)
          css_path.unlink(missing_ok=True)
          PY

      - name: Verify single-file result
        shell: bash
        run: |
          test -f index.html
          test ! -e game-source.html
          test ! -e embed-overrides.css
          grep -q 'tactile-worlds-embed-viewport' index.html
          grep -q 'height: h, fixed: IS_EMBED' index.html
          grep -q "window.innerHeight" index.html

      - name: Commit result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html game-source.html embed-overrides.css
          git commit -m "fix(embed): use fixed single-file viewport layout"
          git push origin main
