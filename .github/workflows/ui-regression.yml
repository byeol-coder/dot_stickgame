name: UI regression

on:
  pull_request:
    paths:
      - 'index.html'
      - 'game-source.html'
      - 'embed-overrides.css'
      - 'styles/**'
      - 'assets/**'
      - 'qa/**'
      - '.github/workflows/ui-regression.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-regression-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  responsive-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.54.2
          npx playwright install --with-deps chromium

      - name: Start local server
        run: |
          python3 -m http.server 4173 > /tmp/dot-stick-server.log 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/dot-stick-server.log
          exit 1

      - name: Run intro-to-result UI audit
        env:
          BASE_URL: http://127.0.0.1:4173/
          QA_OUTPUT: artifacts/ui-regression
        run: node qa/ui-regression.mjs

      - name: Upload screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dot-stick-ui-regression
          path: artifacts/ui-regression
          if-no-files-found: warn
          retention-days: 14
